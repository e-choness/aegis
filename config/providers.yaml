tier_1a:
  provider: anthropic
  enabled_env: TIER_1A_ENABLED
  api_key_env: ANTHROPIC_API_KEY
  models:
    - id: claude-3-5-sonnet
      context_length: 200000
      cost_per_mtok_in: 0.003
      cost_per_mtok_out: 0.015
    - id: claude-3-5-haiku
      context_length: 200000
      cost_per_mtok_in: 0.0008
      cost_per_mtok_out: 0.004

tier_1b:
  provider: azure_openai
  enabled_env: TIER_1B_ENABLED
  api_key_env: AZURE_OPENAI_API_KEY
  base_url_env: AZURE_OPENAI_BASE_URL
  deployment_name: gpt-4-turbo
  models:
    - id: gpt-4-turbo
      context_length: 128000
      cost_per_mtok_in: 0.01
      cost_per_mtok_out: 0.03

tier_2:
  provider: external_llm
  enabled_env: TIER_2_ENABLED
  endpoints:
    - url: http://lm-studio-1.local:8000
      weight: 1
    - url: http://lm-studio-2.local:8000
      weight: 1
  auth:
    type_env: TIER_2_AUTH_TYPE
    api_key:
      header_format: "Authorization: Bearer {token}"
      token_env: TIER_2_API_KEY
    mtls:
      cert_path_env: TIER_2_CERT_PATH
      key_path_env: TIER_2_KEY_PATH
      ca_path_env: TIER_2_CA_PATH
      verify_hostname: true
  model_discovery:
    endpoint: /v1/models
    enabled: true
    cache_ttl_seconds: 300
    stale_on_timeout: true
  failover:
    timeout_seconds: 5
    circuit_breaker_failures: 3
    circuit_breaker_recovery_seconds: 60

tier_3:
  provider: langgraph
  enabled_env: TIER_3_ENABLED
  langgraph_api_url: http://langgraph:8000

model_aliases:
  haiku: "mistral-7b"
  sonnet: "mistral-medium"
  opus: "mistral-large-2"
  local: "llama3.2:8b"
