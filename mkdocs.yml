site_name: Aegis AI Gateway
site_description: Open-source, plugin-first AI gateway framework
site_url: https://e-choness.github.io/aegis/
repo_url: https://github.com/e-choness/aegis
repo_name: e-choness/aegis
docs_dir: docs
hooks:
  - docs/hooks.py
theme:
  name: material
  features:
    - content.code.annotate
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_javascript:
  - javascripts/mermaid-extra.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            docstring_style: google
  - swagger-ui-tag

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Tutorials:
    - Five-minute gateway: tutorials/five-minute-gateway.md
    - Write your first guardrail: tutorials/first-guardrail.md
    - Govern an MCP tool: tutorials/govern-mcp-tool.md
  - How-to guides:
    - PII masking: how-to/pii-masking.md
    - Classification: how-to/classification.md
    - Residency: how-to/residency.md
    - Budgets: how-to/budgets.md
    - Secret backends: how-to/secret-backends.md
    - Streaming modes: how-to/streaming-modes.md
    - HITL approvals: how-to/hitl-approvals.md
    - Deployment: how-to/deployment.md
    - Migrating from v1: how-to/migrating-from-v1.md
  - Reference:
    - Configuration: reference/configuration.md
    - CLI: reference/cli.md
    - REST API: reference/rest-api.md
    - Error codes: reference/errors.md
    - Metrics & spans: reference/metrics.md
  - Explanation:
    - Architecture: explanation/architecture.md
    - Pipeline & verdicts: explanation/pipeline-and-verdicts.md
    - Streaming negotiation: explanation/streaming-negotiation.md
    - Residency model: explanation/residency-model.md
    - Identity levels: explanation/identity-levels.md
    - Dependency doctrine: explanation/dependency-doctrine.md
    - Design decisions: explanation/decisions.md
  - Community:
    - Contributing: CONTRIBUTING.md
    - Code of conduct: CODE_OF_CONDUCT.md
    - Security policy: SECURITY.md
    - Citation: citation.md
    - License: license.md
