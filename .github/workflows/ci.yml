name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start compose services
        run: docker compose up -d

      - name: Install workspace dependencies
        run: docker compose run --rm dev uv sync

      - name: Lint (ruff)
        run: docker compose run --rm dev uv run ruff check .

      - name: Type-check (pyright)
        run: docker compose run --rm dev uv run pyright

      - name: Run tests
        run: docker compose run --rm dev uv run pytest -q

      - name: Build docs (strict)
        run: docker compose run --rm dev uv run mkdocs build --strict

      - name: Link-check docs (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress site/

      - name: Teardown
        if: always()
        run: docker compose down -v

  publish:
    name: Release to PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    permissions:
      # Required for Trusted Publishing (OIDC)
      id-token: write
      # Required to read repository content
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build all packages
        run: uv build --all-packages

      - name: Sequential Publish (Avoid 429)
        shell: bash
        run: |
          # Extract unique package names from the build artifacts
          # and publish them one by one with a delay.
          for sdist in dist/*.tar.gz; do
            echo "Publishing $sdist..."
            uv publish "$sdist" "${sdist%.tar.gz}-py3-none-any.whl" || uv publish "$sdist" "${sdist%.tar.gz}-*.whl"
            echo "Waiting 60 seconds for PyPI project creation limits..."
            sleep 60
          done
