# Aegis v2 — uv workspace root
# This is a virtual workspace root (no installable package).
# All publishable packages live under packages/.

[tool.uv.workspace]
members = ["packages/*", "sdk/python"]

[tool.uv]
dev-dependencies = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "ruff>=0.8",
    "pyright>=1.1",
    "pre-commit>=4",
    "import-linter>=2.0",
    "aegis-pack-pii[pii]",
    "aegis-pack-llm-guard",
    "aegis-core[rag]",
    "aegis-pack-classification",
    "aegis-pack-residency",
    "aegis-pack-budgets",
    "aegis-sdk",
    # Docs
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.27",
    "mkdocs-swagger-ui-tag>=0.6",
    "pytest-examples>=0.0.13",
]

[tool.uv.sources]
aegis-pack-pii = { workspace = true }
aegis-pack-llm-guard = { workspace = true }
aegis-core = { workspace = true }
aegis-pack-classification = { workspace = true }
aegis-pack-residency = { workspace = true }
aegis-pack-budgets = { workspace = true }
aegis-sdk = { workspace = true }

# ── pytest ────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["packages", "sdk/python"]
asyncio_mode = "auto"
# Show short test summary for failures only
addopts = "-rN --import-mode=importlib"

# ── ruff (shared config — ruff.toml takes precedence for lint rules) ──────────
# ruff settings live in ruff.toml at the root.

# ── pyright ───────────────────────────────────────────────────────────────────
# pyright settings live in pyrightconfig.json at the root.
