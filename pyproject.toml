# Aegis v2 — uv workspace root
# This is a virtual workspace root (no installable package).
# All publishable packages live under packages/.

[tool.uv.workspace]
members = ["packages/*", "sdk/python"]

[tool.uv]
dev-dependencies = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "ruff>=0.8",
    "pyright>=1.1",
    "pre-commit>=4",
    "import-linter>=2.0",
    "aegis-gateway-pack-pii[pii]",
    "aegis-gateway-pack-llm-guard",
    "aegis-gateway-core[rag]",
    "aegis-gateway-pack-classification",
    "aegis-gateway-pack-residency",
    "aegis-gateway-pack-budgets",
    "aegis-gateway-sdk",
    # Docs
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.27",
    "mkdocs-swagger-ui-tag>=0.6",
    "pytest-examples>=0.0.13",
    # Changelog
    "git-cliff>=2.0",
]

[tool.uv.sources]
aegis-gateway-pack-pii = { workspace = true }
aegis-gateway-pack-llm-guard = { workspace = true }
aegis-gateway-core = { workspace = true }
aegis-gateway-pack-classification = { workspace = true }
aegis-gateway-pack-residency = { workspace = true }
aegis-gateway-pack-budgets = { workspace = true }
aegis-gateway-sdk = { workspace = true }

# ── pytest ────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["packages", "sdk/python"]
asyncio_mode = "auto"
# Show short test summary for failures only
addopts = "-rN --import-mode=importlib"

# ── ruff (shared config — ruff.toml takes precedence for lint rules) ──────────
# ruff settings live in ruff.toml at the root.

# ── pyright ───────────────────────────────────────────────────────────────────
# pyright settings live in pyrightconfig.json at the root.
