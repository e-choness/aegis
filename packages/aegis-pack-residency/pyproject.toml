[project]
name = "aegis-gateway-pack-residency"
version = "2.0.0a0"
description = "Aegis v2 — data residency policy pack."
license = { text = "MIT" }
requires-python = ">=3.12"

dependencies = ["aegis-gateway-core"]

[project.urls]
Homepage = "https://github.com/e-choness/aegis"
Repository = "https://github.com/e-choness/aegis"
Issues = "https://github.com/e-choness/aegis/issues"

[tool.uv.sources]
aegis-gateway-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aegis_pack_residency"]

[project.entry-points."aegis.guardrails"]
residency = "aegis_pack_residency:ResidencyGuard"

[project.entry-points."aegis.nodes"]
residency_node = "aegis_pack_residency:ResidencyGuard"
