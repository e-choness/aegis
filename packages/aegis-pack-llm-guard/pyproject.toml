[project]
name = "aegis-gateway-pack-llm-guard"
version = "2.0.0a0"
description = "Aegis v2 — LLM Guard adapter policy pack."
license = { text = "MIT" }
requires-python = ">=3.12"

dependencies = ["aegis-gateway-core"]

[project.optional-dependencies]
llm-guard = ["llm-guard>=0.3"]
all = ["aegis-gateway-pack-llm-guard[llm-guard]"]

[project.urls]
Homepage = "https://github.com/e-choness/aegis"
Repository = "https://github.com/e-choness/aegis"
Issues = "https://github.com/e-choness/aegis/issues"

[tool.uv.sources]
aegis-gateway-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aegis_pack_llm_guard"]

[project.entry-points."aegis.guardrails"]
llm_guard = "aegis_pack_llm_guard:LlmGuardAdapter"
