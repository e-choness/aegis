[project]
name = "aegis-pack-llm-guard"
version = "2.0.0a0"
description = "Aegis v2 — LLM Guard adapter policy pack."
license = { text = "MIT" }
requires-python = ">=3.12"
dependencies = ["aegis-core"]

[project.optional-dependencies]
llm-guard = ["llm-guard>=0.3"]
all = ["aegis-pack-llm-guard[llm-guard]"]

[tool.uv.sources]
aegis-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aegis_pack_llm_guard"]

[project.entry-points."aegis.guardrails"]
llm_guard = "aegis_pack_llm_guard:LlmGuardAdapter"
