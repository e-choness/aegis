[project]
name = "aegis-cli"
version = "2.0.0a0"
description = "Aegis v2 — CLI: aegis command with Typer + Rich."
license = { text = "MIT" }
requires-python = ">=3.12"
dependencies = [
    "aegis-core",
    "aegis-server",
    "typer>=0.12",
    "rich>=13",
]

[project.scripts]
aegis = "aegis_cli.main:run"

[tool.uv.sources]
aegis-core = { workspace = true }
aegis-server = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aegis_cli"]
