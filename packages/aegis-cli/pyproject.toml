[project]
name = "aegis-gateway-cli"
version = "2.0.0a0"
description = "Aegis v2 — CLI: aegis command with Typer + Rich."
license = { text = "MIT" }
requires-python = ">=3.12"

dependencies = [
    "aegis-gateway-core",
    "aegis-gateway-sdk",
    "aegis-gateway-server",
    "typer>=0.12",
    "rich>=13",
]

[project.urls]
Homepage = "https://github.com/e-choness/aegis"
Repository = "https://github.com/e-choness/aegis"
Issues = "https://github.com/e-choness/aegis/issues"

[project.scripts]
aegis = "aegis_cli.main:run"

[tool.uv.sources]
aegis-gateway-core = { workspace = true }
aegis-gateway-sdk = { workspace = true }
aegis-gateway-server = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aegis_cli"]
