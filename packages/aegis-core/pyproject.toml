[project]
name = "aegis-core"
version = "2.0.0a0"
description = "Aegis v2 — core kernel: plugin registry, typed config, pipeline contracts."
license = { text = "MIT" }
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "pluggy>=1.4",
    "pyyaml>=6.0",
    "keyring>=25.0",
    "litellm>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aegis_core"]
