[project]
name = "aegis-gateway-pack-pii"
version = "2.0.0a0"
description = "Aegis v2 — PII masking policy pack (Presidio-backed)."
license = { text = "MIT" }
requires-python = ">=3.12"

dependencies = ["aegis-gateway-core"]

[project.optional-dependencies]
pii = [
    "presidio-analyzer>=2.2",
    "presidio-anonymizer>=2.2",
    "spacy>=3.8.0,<3.9",
    "en_core_web_sm @ https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl",
]
all = ["aegis-gateway-pack-pii[pii]"]

[project.urls]
Homepage = "https://github.com/e-choness/aegis"
Repository = "https://github.com/e-choness/aegis"
Issues = "https://github.com/e-choness/aegis/issues"

[tool.uv.sources]
aegis-gateway-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/aegis_pack_pii"]

[project.entry-points."aegis.guardrails"]
pii_mask = "aegis_pack_pii:PiiMaskGuard"

[project.entry-points."aegis.nodes"]
pii_mask_node = "aegis_pack_pii:PiiMaskNode"
pii_unmask_node = "aegis_pack_pii:PiiUnmaskNode"
