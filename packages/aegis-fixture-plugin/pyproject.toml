[project]
name = "aegis-gateway-fixture"
version = "0.1.0"
description = "Fixture plugin for Aegis registry tests — not for production use."
license = { text = "MIT" }
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aegis_fixture_plugin"]

[project.entry-points."aegis.providers"]
fixture-provider = "aegis_fixture_plugin:FixtureProvider"

[project.entry-points."aegis.guardrails"]
fixture-guardrail = "aegis_fixture_plugin:FixtureGuardrail"
