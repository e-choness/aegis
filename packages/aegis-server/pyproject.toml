[project]
name = "aegis-gateway-server"
version = "2.0.0a0"
description = "Aegis v2 — FastAPI server: auth middleware, REST API, SSE streaming."
license = { text = "MIT" }
requires-python = ">=3.12"
dependencies = [
    "aegis-gateway-core",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sse-starlette>=2.1",
    "httpx>=0.27",
    "opentelemetry-api>=1.27",
    "opentelemetry-sdk>=1.27",
    "prometheus-client>=0.21",
]

[tool.uv.sources]
aegis-gateway-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aegis_server"]
