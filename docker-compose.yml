services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      UV_CACHE_DIR: /workspace/.uv-cache
    env_file:
      - path: .env.publish
        required: false
    stdin_open: true
    tty: true

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Observability profile ─────────────────────────────────────────────────
  # Activate with:  docker compose --profile observability up
  prometheus:
    image: prom/prometheus:latest
    profiles: [observability]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    profiles: [observability]
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

  # ── Codegen profile ───────────────────────────────────────────────────────
  # Activate with:  docker compose --profile codegen run --rm codegen generate ...
  # Example (Go):
  #   docker compose run --rm codegen generate \
  #     -i /workspace/openapi.json -g go -o /workspace/.tmp/go-client
  codegen:
    image: openapitools/openapi-generator-cli:latest
    profiles: [codegen]
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["docker-entrypoint.sh"]

volumes:
  postgres_data:
  grafana_data:
